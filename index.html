<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUCH'TAL KANTÉ</title>

<link rel="stylesheet" href="principal.css">
</head>

<body>

<div class="section">
  <h1><i>MUCH'TAL KANTÉ</i></h1>
  <h2>EXPERIENCIA GASTRONÓMICA PREHISPÁNICA</h2>

  <img id="reloj" src="https://res.cloudinary.com/dnrhcpdur/image/upload/v1779865184/reloj2_yx0vlr.jpg">
  <h3><i>Desliza para continuar</i></h3>
</div>

<div class="menu-opciones">
  <div onclick="mostrarMenu('desayuno')">
    <img src="https://res.cloudinary.com/dnrhcpdur/image/upload/v1779865046/sol_eardeg.jpg">
    <p>DESAYUNO</p>
  </div>

  <div onclick="mostrarMenu('comida')">
    <img src="https://res.cloudinary.com/dnrhcpdur/image/upload/v1779865074/viento_oaqelt.jpg">
    <p>COMIDA</p>
  </div>

  <div onclick="mostrarMenu('cena')">
    <img src="https://res.cloudinary.com/dnrhcpdur/image/upload/v1779865097/luna_ayiggg.jpg">
    <p>CENA</p>
  </div>
</div>


<div id="contenedor-platillos" class="contenedor" style="display:none;"></div>
<button id="btnCerrarMenu" class="btn-cerrar-menu" onclick="cerrarMenu()">Cerrar Menu</button>
<div class="carrito-box">
<button id="carrito" onclick="verCarrito()">Pedido(0) $0</button>
</div>


<div id="modalCarrito" class="modal">
  <div class="modal-contenido">
    <h2>Tu pedido</h2>
    <ul id="listaCarrito"></ul>
    <h3 id="total"></h3>
    <button id="cerrar" onclick="cerrarCarrito()">Cerrar</button>
  <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar</button>
  
  <button class="btn-pagar"  onclick="abrirPago()">Pagar</button>

  <div id="modalPago" class="modal">
  <div class="modal-contenido">
    <h2>Metodos de pago</h2>
<div class="metodo-pago">
  <button id="metodoT" onclick="pagoTarjeta()">Tarjeta</button>
<div id="fondoPagoTarjeta">
<input type="text" placeholder="Ingresa tu nombre completo" id="nombre">
<input type="text" placeholder="Ingresa tu numero de tarjeta" id="numero" maxlength="19" oninput="formatearTarjeta(this)">
<input type="text" placeholder="Ingresa tu cvv" id="cvv">
</div>
</div>
<div class="metodo-pago">
 <button id="metodoE" onclick="pagoEfectivo()">Efectivo</button>
 <div class="fondoPagoEfectivo">
<p id="text">Favor de pagar en caja</p>
</div>
</div>
<div class="metodo-pago">
<button id="metodoPP" onclick="pagoPayPal()">PayPal</button>
 <div class="fondoPagoPayPal">
<label for="correo">Ingresa tu Correo</label>
<input type="text" placeholder="ejemplo@gmai.com" id="correo">
<input type="text" placeholder="Ingresa tu cuenta de envio" id="cont">
</div>
</div>
<button id="btn-final" onclick="finalizarCompra()">Finalizar compra</button>
       <button  id="cerrar"onclick="cerrarPago()">Cerrar</button>
</div>
</div>

</div>
</div>



<footer class="footer">

<div class="mapa-footer">
<iframe src="https://www.google.com/maps?q=Lomas+de+Chapultepec+Ciudad+de+Mexico&output=embed" allowfullscreen=" "loading="lazy">
</iframe>
</div>
<div class="info-footer">
<h3>Contacto y Ubicacion</h3>
<p>Col Tosc liv 5 num 23 Lomas de Chapultepec</p>
<p>5567463021</p>
<p>muchkal@gmail.com</p>
</div>
</footer>

<script src="principal.js"></script>

</body>
</html>
