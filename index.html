<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUCH'TAL KANTÉ</title>

<link rel="stylesheet" href="principal.css">
</head>

<body>

<div class="section">
  <h1><i>MUCH'TAL KANTÉ</i></h1>
  <h2>EXPERIENCIA GASTRONÓMICA PREHISPÁNICA</h2>

  <img id="reloj" src="reloj2.jpg">
  <h3><i>Desliza para continuar</i></h3>
</div>

<div class="menu-opciones">
  <div onclick="mostrarMenu('desayuno')">
    <img src="sol.jpg">
    <p>DESAYUNO</p>
  </div>

  <div onclick="mostrarMenu('comida')">
    <img src="viento.jpg">
    <p>COMIDA</p>
  </div>

  <div onclick="mostrarMenu('cena')">
    <img src="luna.jpg">
    <p>CENA</p>
  </div>
</div>


<div id="contenedor-platillos" class="contenedor" style="display:none;"></div>
<button id="btnCerrarMenu" class="btn-cerrar-menu" onclick="cerrarMenu()">Cerrar Menu</button>
<div class="carrito-box">
<button id="carrito" onclick="verCarrito()">Pedido(0) $0</button>
</div>


<div id="modalCarrito" class="modal">
  <div class="modal-contenido">
    <h2>Tu pedido</h2>
    <ul id="listaCarrito"></ul>
    <h3 id="total"></h3>
    <button id="cerrar" onclick="cerrarCarrito()">Cerrar</button>
  <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar</button>
  
  <button class="btn-pagar"  onclick="abrirPago()">Pagar</button>

  <div id="modalPago" class="modal">
  <div class="modal-contenido">
    <h2>Metodos de pago</h2>
<div class="metodo-pago">
  <button class="metodo" onclick="pagoTarjeta()">Tarjeta</button>
<div id="fondoPagoTarjeta">
<input type="text" placeholder="Ingresa tu nombre completo" id="nombre">
<input type="text" placeholder="Ingresa tu numero de tarjeta" id="numero">
<input type="text" placeholder="Ingresa tu cvv" id="cvv">
</div>
</div>
<div class="metodo-pago">
 <button class="metodo" onclick="pagoEfectivo()">Efectivo</button>
 <div class="fondoPagoEfectivo">
<p id="text">Favor de pagar en caja</p>
</div>
</div>
<div class="metodo-pago">
<button class="metodo" onclick="pagoPayPal()">PayPal</button>
 <div class="fondoPagoPayPal">
<label for="correo">Ingresa tu Correo</label>
<input type="text" placeholder="ejemplo@gmai.com" id="correo">
<input type="text" placeholder="Ingresa tu cuenta de envio" id="cont">
</div>
</div>
       <button  id="cerrar"onclick="cerrarPago()">Cerrar</button>
</div>
</div>

</div>
</div>

<footer>
<h3>Redes Sociales</h3>
Calle 30 Tepic<br>
52585757<br>
 practica@gmail.com
</footer>

<script src="principal.js"></script>

</body>
</html>
